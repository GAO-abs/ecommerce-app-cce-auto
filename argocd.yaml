apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: admin-dashboard-app
  namespace: argocd   # must be argocd namespace
spec:
  project: default

  source:
    repoURL: https://github.com/GAO-abs/k8s-manifests-argocd-gitops.git
    targetRevision: HEAD
    path: admin-dashboard-chart   # folder in repo where manifests are

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true